name: Deploy Firebase backend

on:
  push:
    branches: [main]
    paths:
      - "functions/**"
      - "firestore.rules"
      - ".github/workflows/firebase-deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install function dependencies
        run: npm install --prefix functions

      - name: Build functions
        run: npm run build --prefix functions

      - name: Write service account key
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa-key.json"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy rules + functions
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa-key.json
        run: >
          firebase deploy --project prvfire33 --non-interactive
          --only "firestore:rules,functions:rebuildAreaAggregates,functions:scheduledAreaAggregates,functions:rebuildWorldAggregates,functions:scheduledWorldAggregates,functions:rebuildCityAggregates,functions:scheduledCityAggregates,functions:sendInboundImpression,functions:deleteAccount,functions:seedTaxonomies,functions:scheduledTaxonomies"
